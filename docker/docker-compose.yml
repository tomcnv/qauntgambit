version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: deeptrader-postgres
    environment:
      POSTGRES_DB: deeptrader
      POSTGRES_USER: deeptrader_user
      POSTGRES_PASSWORD: deeptrader_pass
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - deeptrader-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deeptrader_user -d deeptrader"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: deeptrader-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - deeptrader-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  pgadmin:
    image: dpage/pgadmin4
    container_name: deeptrader-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@deeptrader.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8080:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - deeptrader-network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  deeptrader-network:
    driver: bridge
