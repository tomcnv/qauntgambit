# Redis tuned for dev infra on mini-b
bind 0.0.0.0
# Allow LAN access (dev). Add a password if your network isn't trusted.
protected-mode no
port 6379
tcp-keepalive 60

# Persistence (AOF with reasonable durability)
appendonly yes
appendfsync everysec
save 900 1
save 300 10
save 60 10000

# Memory policy (adjust maxmemory to your host budget)
maxmemory 1gb
maxmemory-policy allkeys-lru

# Other defaults left as-is
