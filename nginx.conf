# QuantGambit Local Development - Nginx Reverse Proxy Configuration
#
# This configuration routes:
#   - quantgambit.local           -> Landing page (port 3000)
#   - dashboard.quantgambit.local -> Dashboard (port 5173)
#   - api.quantgambit.local       -> Core backend (port 3001)
#   - bot.quantgambit.local       -> QuantGambit API (port 3002)
#
# ═══════════════════════════════════════════════════════════════════════════
# SETUP INSTRUCTIONS
# ═══════════════════════════════════════════════════════════════════════════
#
# 1. Install nginx (macOS):
#    brew install nginx
#
# 2. Get your Mac's local IP:
#    ipconfig getifaddr en0    # Wi-Fi
#    ipconfig getifaddr en1    # Ethernet
#
# 3. On THIS machine (the server), add to /etc/hosts:
#    127.0.0.1 quantgambit.local dashboard.quantgambit.local api.quantgambit.local
#
# 4. On OTHER machines (clients), add to /etc/hosts (replace with your Mac's IP):
#    192.168.x.x quantgambit.local dashboard.quantgambit.local api.quantgambit.local
#
#    - macOS/Linux: sudo nano /etc/hosts
#    - Windows: Edit C:\Windows\System32\drivers\etc\hosts as Administrator
#
# 5. Start nginx with this config:
#    sudo nginx -c /Users/thomas/projects/deeptrader/nginx.conf
#
# 6. Reload after changes:
#    sudo nginx -s reload
#
# 7. Stop nginx:
#    sudo nginx -s stop
#
# ═══════════════════════════════════════════════════════════════════════════

worker_processes auto;
error_log /tmp/nginx-quantgambit-error.log;
pid /tmp/nginx-quantgambit.pid;

events {
    worker_connections 1024;
}

http {
    # Try both Homebrew locations (Apple Silicon and Intel)
    include       /opt/homebrew/etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    access_log /tmp/nginx-quantgambit-access.log;
    
    sendfile on;
    keepalive_timeout 65;
    
    # Increase buffer sizes for WebSocket
    proxy_buffer_size 128k;
    proxy_buffers 4 256k;
    proxy_busy_buffers_size 256k;
    
    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    
    # ─────────────────────────────────────────────────────────────────────────
    # Landing Page: quantgambit.local -> localhost:3000
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name quantgambit.local;

        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support for Vite HMR
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Dashboard: dashboard.quantgambit.local -> localhost:5173
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name dashboard.quantgambit.local;

        location / {
            proxy_pass http://127.0.0.1:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support for Vite HMR
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # API: api.quantgambit.local -> localhost:3001
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name api.quantgambit.local;
        
        # Increase body size for file uploads
        client_max_body_size 50M;

        # FastAPI docs assets expect absolute paths like /openapi.json and /docs/oauth2-redirect.
        # When serving docs via api.quantgambit.local, route these to the bot API.
        location = /openapi.json {
            proxy_pass http://127.0.0.1:3002/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /docs {
            proxy_pass http://127.0.0.1:3002/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /docs/ {
            proxy_pass http://127.0.0.1:3002/docs/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /redoc {
            proxy_pass http://127.0.0.1:3002/redoc;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /redoc/ {
            proxy_pass http://127.0.0.1:3002/redoc/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Platform docs served by Python QuantGambit API (port 3002).
        # FastAPI serves docs at /docs; expose them under /api/docs.
        location = /api/docs {
            proxy_pass http://127.0.0.1:3002/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/docs/ {
            proxy_pass http://127.0.0.1:3002/docs/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support for real-time updates
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Bot API: bot.quantgambit.local -> localhost:3002
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name bot.quantgambit.local;

        # Increase body size for file uploads
        client_max_body_size 50M;

        # SSE streaming for copilot chat — disable buffering so events
        # are flushed to the client immediately
        location /api/v1/copilot/chat {
            proxy_pass http://127.0.0.1:3002;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Critical for SSE: disable all buffering
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;

            # Long timeout for multi-turn ReAct loops
            proxy_read_timeout 300;
            proxy_send_timeout 300;
        }

        location / {
            proxy_pass http://127.0.0.1:3002;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket support if enabled on bot API
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }
    }
    
    # ─────────────────────────────────────────────────────────────────────────
    # Default server - catch-all for unmatched requests
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        
        return 444;  # Close connection without response
    }
}
